<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" aria-hidden="true">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Center hub -->
  <circle cx="100" cy="100" r="9" fill="currentColor"/>
  <circle cx="100" cy="100" r="4" fill="#FFFFFF"/>

  <!-- 8 inner spokes -->
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="100" y1="22" x2="100" y2="178"/>
    <line x1="22"  y1="100" x2="178" y2="100"/>
    <line x1="44.86" y1="44.86" x2="155.14" y2="155.14"/>
    <line x1="155.14" y1="44.86" x2="44.86" y2="155.14"/>
  </g>

  <!-- 8 outer handles (T-bars sticking outward) -->
  <g stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- 12 o'clock -->
    <line x1="100" y1="6"  x2="100" y2="22"/>
    <line x1="92"  y1="6"  x2="108" y2="6"/>
    <!-- 6 o'clock -->
    <line x1="100" y1="178" x2="100" y2="194"/>
    <line x1="92"  y1="194" x2="108" y2="194"/>
    <!-- 3 o'clock -->
    <line x1="178" y1="100" x2="194" y2="100"/>
    <line x1="194" y1="92"  x2="194" y2="108"/>
    <!-- 9 o'clock -->
    <line x1="6"   y1="100" x2="22"  y2="100"/>
    <line x1="6"   y1="92"  x2="6"   y2="108"/>
    <!-- 1:30 (top-right diagonal) -->
    <line x1="155.14" y1="44.86" x2="166.45" y2="33.55"/>
    <line x1="160.79" y1="27.91" x2="172.10" y2="39.21"/>
    <!-- 10:30 (top-left diagonal) -->
    <line x1="44.86" y1="44.86" x2="33.55" y2="33.55"/>
    <line x1="27.91" y1="39.21" x2="39.21" y2="27.91"/>
    <!-- 4:30 (bottom-right diagonal) -->
    <line x1="155.14" y1="155.14" x2="166.45" y2="166.45"/>
    <line x1="160.79" y1="172.10" x2="172.10" y2="160.79"/>
    <!-- 7:30 (bottom-left diagonal) -->
    <line x1="44.86" y1="155.14" x2="33.55" y2="166.45"/>
    <line x1="27.91" y1="160.79" x2="39.21" y2="172.10"/>
  </g>
</svg>
